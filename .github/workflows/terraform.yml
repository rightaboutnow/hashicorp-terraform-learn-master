name: Terraform

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual "Run workflow" in addition to push

# Cancel superseded runs on the same branch
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # Required for OIDC token request
  contents: read

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  # ── 1. PLAN (init + validate + plan in one job) ──────────
  plan:
    name: Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: tfplan
          retention-days: 5

  # ── 2. APPLY (waits for manual approval via the environment) ──
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    # The 'production' environment has a required reviewer, so this run pauses
    # here after plan and waits for an Approve/Reject click — no re-run needed.
    # Approving applies the exact plan produced by the plan job.
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15"

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
