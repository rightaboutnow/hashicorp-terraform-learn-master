name: Terraform

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual "Run workflow" button → enables the apply job
    inputs:
      action:
        description: "What to run. Choose 'apply' to deploy (requires the confirm box below)."
        type: choice
        options:
          - plan
          - apply
        default: plan
      confirm:
        description: 'Type "apply" to confirm. Only honored when action = apply.'
        type: string
        default: ""

# Cancel superseded runs on the same branch
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # Required for OIDC token request
  contents: read

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  # ── 1. INIT ──────────────────────────────────────────────
  init:
    name: Init & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

  # ── 2. PLAN ──────────────────────────────────────────────
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: init
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: tfplan
          retention-days: 5

  # ── 3. APPLY (manual: workflow_dispatch + action=apply) ──
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    # Skipped on push and on manual plan-only runs; only scheduled when you pick action=apply.
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    steps:
      - name: Verify confirmation
        if: inputs.confirm != 'apply'
        run: |
          echo "::error::action=apply was selected but the confirm box was not set to 'apply'. Aborting before any changes."
          exit 1

      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15"

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
