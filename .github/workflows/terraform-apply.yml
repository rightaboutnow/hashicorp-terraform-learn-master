name: Terraform Apply

# Manual, environment-aware deploy. You pick dev/test/prod when running it; the
# choice drives the state file (learnapp-<env>.tfstate), the -var-file, and the
# GitHub Environment used for the apply approval gate.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

# Independent lock per environment, so a dev run never blocks a prod run.
concurrency:
  group: terraform-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write   # Required for OIDC token request
  contents: read

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_ENV: ${{ inputs.environment }}

jobs:
  # ── 1. PLAN (init + validate + plan in one job) ──────────
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    outputs:
      state_key: ${{ steps.ctx.outputs.state_key }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve state key from tfvars
        id: ctx
        # application_name is the single source of truth (environments/<env>.tfvars).
        # The state key is derived from it so nothing is hardcoded in the workflow.
        run: |
          tfvars="environments/${TF_ENV}.tfvars"
          app_name=$(grep -E '^[[:space:]]*application_name[[:space:]]*=' "$tfvars" \
            | grep -vE '^[[:space:]]*#' | head -n1 \
            | sed -E 's/.*=[[:space:]]*"([^"]*)".*/\1/')
          if [ -z "$app_name" ]; then
            echo "::error::application_name not found in $tfvars"; exit 1
          fi
          echo "state_key=${app_name}-${TF_ENV}.tfstate" >> "$GITHUB_OUTPUT"
          echo "Resolved app_name='${app_name}' → state key '${app_name}-${TF_ENV}.tfstate'"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15"

      - name: Terraform Init
        # Per-environment state file via partial backend config.
        run: terraform init -backend-config="key=${{ steps.ctx.outputs.state_key }}"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        # -var-file selects the environment's settings; -lock-timeout fails fast
        # on a stale lock instead of hanging.
        run: terraform plan -no-color -lock-timeout=120s -var-file="environments/${TF_ENV}.tfvars" -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ inputs.environment }}
          path: tfplan
          retention-days: 5

  # ── 2. APPLY (waits for manual approval via the environment) ──
  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: plan
    # The selected environment's protection rules (e.g. a required reviewer on
    # prod) make this run pause for approval after plan — no re-run needed.
    # The environment name also changes the OIDC subject to
    # repo:<org>/<repo>:environment:<env>, matched by the github-env-<env> creds.
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15"

      - name: Terraform Init
        # Reuse the exact state key resolved by the plan job.
        run: terraform init -backend-config="key=${{ needs.plan.outputs.state_key }}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ inputs.environment }}

      - name: Terraform Apply
        run: terraform apply -lock-timeout=120s -auto-approve tfplan
